{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Edit Profile</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    .box {
      width: 100%;
      max-width: 520px;
      background: #8492a1;
      border-radius: 12px;
      padding: 26px;
      box-sizing: border-box;
    }

    .box h1 {
      margin: 0 0 18px 0;
      text-align: center;
      font-size: 26px;
    }

    form p { margin: 12px 0; }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .errorlist {
      color: #000;
      font-weight: 800;
      padding-left: 18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Edit Profile</h1>

    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Save</button>
    </form>
  </div>
</body>
</html>
