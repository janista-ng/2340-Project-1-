{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .box {
      width: 100%;
      max-width: 420px;
      background: #8492a1;
      border-radius: 12px;
      padding: 26px;
      box-sizing: border-box;
    }

    .box h1 {
      margin: 0 0 18px 0;
      text-align: center;
      font-size: 28px;
      color: #fff;
    }

    form p {
      margin: 12px 0;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: none;
      outline: none;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .links {
      margin-top: 14px;
      text-align: center;
    }

    .links a {
      color: #fff;
      font-weight: 700;
      text-decoration: underline;
    }

    .errorlist {
      margin: 8px 0 0 0;
      padding-left: 18px;
      color: #000;
      font-weight: 700;
    }

    .helptext {
      display: block;
      margin-top: 6px;
      font-size: 12px;
      color: #111;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sign Up</h1>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Create Account</button>
    </form>

    <div class="links">
      <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
    </div>
  </div>
</body>
</html>
