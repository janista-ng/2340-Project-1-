{% extends "home/base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<style>
  .content-wrapper {
    width: 100%;
    min-height: 100vh;
    padding: 24px;
    box-sizing: border-box;
    background: #f5f7fa;  
    color: #222;           
    font-family: Arial, sans-serif;
  }

  .box {
    width: 100%;
    max-width: 420px;
    background: #fff;         
    border-radius: 12px;
    padding: 26px;
    box-sizing: border-box;
    margin: 0 auto;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }

  .box h1 {
    margin: 0 0 18px 0;
    text-align: center;
    font-size: 28px;
    color: #4f7cac;           
  }

  form p {
    margin: 12px 0;
  }

  label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #222;
  }

  input, select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    box-sizing: border-box;
    font-size: 16px;
    background: #fff;
    color: #222;
  }

  button {
    width: 100%;
    margin-top: 14px;
    padding: 10px 12px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    background: #4f7cac;      
    color: #fff;
  }

  button:hover {
    opacity: 0.9;
  }

  .links {
    margin-top: 14px;
    text-align: center;
  }

  .links a {
    color: #4f7cac;           
    font-weight: 700;
    text-decoration: underline;
  }

  .errorlist {
    margin: 8px 0 0 0;
    padding-left: 18px;
    color: #ff4d4d;           
    font-weight: 700;
  }

  .helptext {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    color: #555;             
    opacity: 0.9;
  }
</style>

<div class="content-wrapper">
  <div class="box">
    <h1>Sign Up</h1>

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}
      <p>
        <label for="id_role">I am a:</label>
        <select name="role" id="id_role">
          <option value="job_seeker">Job Seeker</option>
          <option value="recruiter">Recruiter</option>
        </select>
      </p>

      <button type="submit">Create Account</button>
    </form>

    <div class="links">
      <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
    </div>
  </div>
</div>
{% endblock %}
